# OpenShell-NATIVE policy: read-only workspace (workdir is in read_only, not
# read_write), no network, no MCP. {workdir} substituted at runtime.
version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /proc
    - /dev/urandom
    - "{workdir}"
  read_write:
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policy:
  default: deny
  endpoints: []
mcp_policy:
  default: deny
  allow: []
