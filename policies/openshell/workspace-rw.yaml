# OpenShell-NATIVE policy (landlock-based). Matches the schema OpenShell reports
# for an effective policy. {workdir} is substituted with the sandbox workspace
# dir at runtime. Read-write workspace, no network, MCP restricted to github.
version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /proc
    - /dev/urandom
  read_write:
    - "{workdir}"
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policy:
  default: deny
  endpoints: []
mcp_policy:
  default: deny
  allow:
    - github
